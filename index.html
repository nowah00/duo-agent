<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>duo-agent</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        background: #faf8f5;
        color: #3d2b1f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-width: 320px;
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(rgba(160, 132, 92, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(160, 132, 92, 0.08) 1px, transparent 1px),
          linear-gradient(180deg, #faf8f5 0%, #f5f0e8 100%);
        background-size: 24px 24px;
      }

      button,
      summary {
        font: inherit;
      }

      #app {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
